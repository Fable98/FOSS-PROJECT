# ═══════════════════════════════════════════════════════════════
#  SubTerra — Real-Time Groundwater Evaluation Platform
#  docker-compose.yml — Full stack local development setup
#
#  Usage:
#    Start all:       docker-compose up --build
#    Stop:            docker-compose down
#    Reset all data:  docker-compose down -v
#    Logs:            docker-compose logs -f <service>
#    With pgAdmin:    docker-compose --profile tools up --build
#
#  Services:
#    db        → TimescaleDB on port 5432
#    redis     → Redis cache on port 6379
#    backend   → FastAPI on port 8000
#    scraper   → DWLR data pipeline (runs every 15 min)
#    frontend  → React UI on port 3000
#    pgadmin   → DB browser on port 5050 (--profile tools only)
# ═══════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────
  # 🗄️  DATABASE — PostgreSQL + TimescaleDB
  #     Stores all DWLR readings (time-series)
  #     hypertable partitioned by 7-day chunks
  # ─────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: subterra_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-subterra}
      POSTGRES_USER:     ${POSTGRES_USER:-subterra_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-subterra_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subterra_user} -d ${POSTGRES_DB:-subterra}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - subterra_network

  # ─────────────────────────────────────────────
  # 🔴  CACHE — Redis
  #     Caches API responses and station statuses
  #     so FastAPI doesn't hit the DB every request
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: subterra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - subterra_network

  # ─────────────────────────────────────────────
  # ⚙️  BACKEND — FastAPI
  #     Serves REST API + runs Task 1/2/3 algorithms
  #     API docs: http://localhost:8000/docs
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: subterra_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-subterra_user}:${POSTGRES_PASSWORD:-subterra_pass}@db:5432/${POSTGRES_DB:-subterra}
      REDIS_URL:    redis://redis:6379
      APP_ENV:      development
      DEBUG:        "true"
      SECRET_KEY:   ${SECRET_KEY:-change-this-in-production}
      INDIA_WRIS_BASE_URL: ${WRIS_BASE_URL:-https://indiawris.gov.in}
      IMD_BASE_URL:        ${IMD_BASE_URL:-https://imdaws.imd.gov.in}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app         # live reload in development
      - ./data:/app/data       # shared data folder (sample CSVs, raw, processed)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - subterra_network

  # ─────────────────────────────────────────────
  # 🔄  SCRAPER — Data Pipeline
  #     Fetches live DWLR readings from India-WRIS
  #     + IMD rainfall every 15 minutes
  #     Cleans data and writes to TimescaleDB
  # ─────────────────────────────────────────────
  scraper:
    build:
      context: ./data
      dockerfile: Dockerfile.scraper
    container_name: subterra_scraper
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:        postgresql://${POSTGRES_USER:-subterra_user}:${POSTGRES_PASSWORD:-subterra_pass}@db:5432/${POSTGRES_DB:-subterra}
      WRIS_BASE_URL:       ${WRIS_BASE_URL:-https://indiawris.gov.in}
      IMD_BASE_URL:        ${IMD_BASE_URL:-https://imdaws.imd.gov.in}
      FETCH_INTERVAL_SEC:  ${FETCH_INTERVAL_SEC:-900}
      MAX_RETRIES:         ${MAX_RETRIES:-3}
      RETRY_BACKOFF_SEC:   ${RETRY_BACKOFF_SEC:-10}
      REQUEST_TIMEOUT_SEC: ${REQUEST_TIMEOUT_SEC:-30}
    volumes:
      - ./data:/app/data        # raw/, processed/, sample/
      - scraper_logs:/app/logs  # persistent log storage
    depends_on:
      db:
        condition: service_healthy
    command: python scripts/scraper.py
    networks:
      - subterra_network

  # ─────────────────────────────────────────────
  # 🌐  FRONTEND — React
  #     Interactive map, dashboard, charts, alerts
  #     UI: http://localhost:3000
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000
    container_name: subterra_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL:  http://localhost:8000
      REACT_APP_APP_NAME: SubTerra
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - subterra_network

  # ─────────────────────────────────────────────
  # 📊  PGADMIN — Database Browser (optional)
  #     Only starts with: docker-compose --profile tools up
  #     Open: http://localhost:5050
  #     Login: admin@subterra.dev / admin
  # ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: subterra_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@subterra.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - subterra_network
    profiles:
      - tools

# ─────────────────────────────────────────────
# 📦  VOLUMES
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    name: subterra_postgres_data
  redis_data:
    name: subterra_redis_data
  scraper_logs:
    name: subterra_scraper_logs

# ─────────────────────────────────────────────
# 🌐  NETWORKS
# ─────────────────────────────────────────────
networks:
  subterra_network:
    name: subterra_network
    driver: bridge
