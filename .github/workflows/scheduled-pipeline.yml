name: AquaPulse — Scheduled Data Pipeline

on:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Which task to run"
        required: true
        default: all
        type: choice
        options: [all, task1, task2, task3, historical_sync]
      dry_run:
        description: "Dry run (no DB write)"
        required: false
        default: "false"
        type: boolean

env:
  PYTHON_VERSION: "3.11"

jobs:
  realtime-fetch:
    name: ⚡ Real-Time DWLR Fetch (15-min)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '*/15 * * * *')

    env:
      WRIS_API_KEY:    ${{ secrets.WRIS_API_KEY }}
      IMD_API_KEY:     ${{ secrets.IMD_API_KEY }}
      DATAGOV_API_KEY: ${{ secrets.DATAGOV_API_KEY }}
      DB_URL:          ${{ secrets.PROD_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Task 1 — Real-time water level fetch
        run: |
          cd backend
          ARGS="--task 1"
          [ "${{ github.event.inputs.dry_run }}" == "true" ] && ARGS="$ARGS --dry-run"
          python pipeline.py $ARGS

      - name: Run Task 2 — Recharge update
        run: cd backend && python pipeline.py --task 2

      - name: Run Task 3 — Zone reclassification
        run: cd backend && python pipeline.py --task 3

      - name: Log pipeline run
        if: always()
        run: |
          cd backend
          python scripts/log_pipeline_run.py \
            --status "${{ job.status }}" \
            --run-id "${{ github.run_id }}" \
            --trigger "schedule-15min"

  daily-sync:
    name: 🔄 Daily Historical Sync
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' &&
       github.event.schedule == '30 20 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.task == 'historical_sync')

    env:
      WRIS_API_KEY:    ${{ secrets.WRIS_API_KEY }}
      IMD_API_KEY:     ${{ secrets.IMD_API_KEY }}
      DATAGOV_API_KEY: ${{ secrets.DATAGOV_API_KEY }}
      DB_URL:          ${{ secrets.PROD_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Sync historical water levels
        run: cd backend && python pipeline.py --task 1 --historical

      - name: Sync IMD rainfall archive
        run: cd backend && python scripts/sync_rainfall.py --days 30

      - name: Upload daily report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-report-${{ github.run_number }}
          path: backend/reports/
          retention-days: 30
